<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavBar Dev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/img/favicom.png" type="image/x-icon">
</head>
<body>
    <header>
        <img class="logo" src="/img/logo-dev.jpg" alt="Logo da RL">
        <nav class="menu">
            <a href="#">Inicio</a>
            <a href="#">Sobre</a>
            <a href="#">Serviço</a>
            <a href="#">contato</a>
        </nav>
    </header>
    <main>
        <div class="login-container">
            <form class="login-box">
                <h2>Login</h2>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" name="password" id="password" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
                <a href="#" class="forgot-password">Esqueceu a sua senha?</a>
            </form>
        </div>
    </main>
    <footer>
        <H3>Ricardo Leite- Web Developer- </H3>
        <P> Nosso compromisso é com a inovação e a entrega de soluções inteligentes.</P>
        <a href="#">Termos de Uso</a>
        <a href="#">Politica de Privacidade</a>
        <a href="#">Suporte</a>
    </footer>
</body>
</html>
